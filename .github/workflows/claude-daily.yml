name: Claude - Daily Update

on:
  schedule:
    - cron: "10 6 * * *"
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  claude_daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Optional: Mini-Debug (kannst du später entfernen)
      - name: Debug OIDC env
        run: |
          echo "ACTIONS_ID_TOKEN_REQUEST_URL is set? -> ${ACTIONS_ID_TOKEN_REQUEST_URL:+yes}"
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN is set? -> ${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+yes}"

      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Follow CLAUDE.md strictly.

            Use today's date in Europe/Berlin format YYYY-MM-DD.
            Create/update:
            - docs/news/YYYY-MM/daily-YYYY-MM-DD.md (10–20 items, each with 1–3 sources + tags)
            - docs/ideas/YYYY-MM/daily-YYYY-MM-DD.md (20–40 ideas derived from news)

            Update docs/index.md with links to newest daily files.

            Create a branch content/daily-YYYY-MM-DD, commit, and open a PR:
            Title: "AI Content Update: YYYY-MM-DD"
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: content/daily-${{ github.run_id }}
          title: "AI Content Update"
          commit-message: "Daily update"
          body: "Automated daily content update by Claude"
