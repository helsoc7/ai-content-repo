name: Claude - Daily News + Ideas

on:
  schedule:
    - cron: "10 6 * * *" # täglich 06:10 UTC
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install RSS dependencies
        run: pip install feedparser

      - name: Fetch RSS feeds
        run: python scripts/fetch_feeds.py

      - name: Run Claude Code Action (write files only)
        uses: anthropics/claude-code-action@v1
        
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            prompt: |
                Follow CLAUDE.md strictly.
              
                You are generating content for a MkDocs documentation site.
              
                Input file:
                data/news_links.json
              
                This JSON file has the structure:
              
                {
                  "generated_at": "...",
                  "feeds_count": ...,
                  "items_count": ...,
                  "items": [
                    {
                      "title": "...",
                      "link": "...",
                      "source": "...",
                      "published_at": "...",
                      "summary": "..."
                    }
                  ]
                }
              
                IMPORTANT RULES:
                - Only use the entries in the "items" array.
                - Do NOT invent news.
                - Do NOT run git commands.
                - Only create or update Markdown files inside docs/.
                - Write in German.
              
                Use today's date in Europe/Berlin format YYYY-MM-DD.
              
                Create the following files:
              
                ------------------------------------------------
              
                docs/news/YYYY-MM/daily-YYYY-MM-DD.md
              
                Requirements:
              
                Title:
                # Daily AI Brief — YYYY-MM-DD
              
                Structure:
              
                1) Intro section
              
                ## Was heute wichtig ist
              
                Write a short 3–5 sentence overview of the main themes across the news.
              
                2) News section
              
                ## News
              
                For each article in the JSON items list create a subsection:
              
                ### <title>
              
                **Quelle:** <source>  
                **Link:** <link>
              
                Short summary (2–3 sentences) using the provided summary field as context.
              
                Then add:
              
                **Warum relevant?**  
                One sentence explaining why this matters for developers, AI users or industry.
              
                Add tags if obvious:
              
                Tags examples:
                - llm
                - agentic
                - multi-agent
                - research
                - policy
                - open-source
              
                ------------------------------------------------
              
                Also create or update:
              
                docs/news/latest.md
              
                Requirements:
              
                Title:
                # Latest AI Brief
              
                Include:
              
                Last updated: YYYY-MM-DD
              
                Then copy the same content as today's daily brief.
              
                ------------------------------------------------
              
                Finally update:
              
                docs/index.md
              
                At the top of the page add:
              
                ## Latest AI News
              
                - [Latest AI Brief](news/latest.md)
                - [Daily Brief YYYY-MM-DD](news/YYYY-MM/daily-YYYY-MM-DD.md)
              
                Do not modify any other sections of the file.

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: content/daily-${{ github.run_id }}
          title: "AI Content Update (Daily)"
          commit-message: "Daily content update"
          body: |
            Automated daily update:
            - fetched RSS feeds
            - generated daily news + content ideas
