name: Claude - Daily News + Ideas

on:
  schedule:
    - cron: "10 6 * * *" # täglich 06:10 UTC
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser requests beautifulsoup4

      - name: Fetch RSS feeds
        run: python scripts/fetch_feeds.py

      - name: Fetch article texts
        run: python scripts/fetch_article_texts.py

      - name: Run Claude Code Action (write files only)
        uses: anthropics/claude-code-action@v1
        
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            prompt: |
                Follow CLAUDE.md strictly.

            You are generating content for a MkDocs documentation site.

            Read the file:
            data/news_articles.json

            IMPORTANT RULES:
            - Only use the entries in the "items" array.
            - Use the fields title, source, link, published_at, summary, article_text.
            - If article_text starts with FETCH_ERROR, fall back to title + summary only.
            - Do NOT invent news.
            - Do NOT run git commands.
            - Only create or update Markdown files inside docs/.
            - Write in German.

            Use today's date in Europe/Berlin format YYYY-MM-DD.
            Use the current year-month folder format YYYY-MM.

            Create or update:

            1. docs/news/YYYY-MM/daily-YYYY-MM-DD.md
            2. docs/news/latest.md
            3. docs/index.md

            Requirements for docs/news/YYYY-MM/daily-YYYY-MM-DD.md:

            Title:
            # Daily AI Brief — YYYY-MM-DD

            Structure:
            - Intro section:
              ## Was heute wichtig ist
              Write a short 3–5 sentence overview of the main themes.

            - Then:
              ## News

            - For each article create a subsection:

              ### <title>

              **Quelle:** <source>  
              **Veröffentlicht:** <published_at>  
              **Link:** <link>

              Then write:
              - a short summary in German with 2–4 sentences
              - one short paragraph:
                **Warum relevant?**
              - one line:
                **Tags:** <comma separated tags>

            Requirements for docs/news/latest.md:
            - same content as the daily file
            - title must be:
              # Latest AI Brief
            - include:
              Last updated: YYYY-MM-DD

            Requirements for docs/index.md:
            - at the top add this section if it does not exist:
              ## Latest AI News
            - underneath include exactly these links:
              - [Latest AI Brief](news/latest.md)
              - [Daily Brief YYYY-MM-DD](news/YYYY-MM/daily-YYYY-MM-DD.md)
            - keep the rest of the page intact
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          add-paths: |
            docs/**
          branch: content/daily-${{ github.run_id }}
          title: "AI Content Update (Daily)"
          commit-message: "Daily news update"
          body: |
            Automated daily update:
            - fetched RSS feeds
            - fetched article texts
            - generated daily AI brief
            - updated latest news page
            - updated docs index
