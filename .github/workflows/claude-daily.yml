name: Claude - Daily News + Ideas

on:
  schedule:
    - cron: "10 6 * * *" # täglich 06:10 UTC
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install RSS dependencies
        run: pip install feedparser

      - name: Fetch RSS feeds
        run: python scripts/fetch_feeds.py

      - name: Run Claude Code Action (write files only)
        uses: anthropics/claude-code-action@v1
        
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Follow CLAUDE.md strictly.

            Read the input file data/news_links.json.

            IMPORTANT:
            - Only use the articles found in data/news_links.json.
            - Do NOT run git commands.
            - Do NOT create branches or pull requests.
            - Only create or update markdown files inside docs/.

            Use today's date in Europe/Berlin format YYYY-MM-DD.

            Create or update:
            1. docs/news/YYYY-MM/daily-YYYY-MM-DD.md
            2. docs/news/latest.md

            Requirements for docs/news/YYYY-MM/daily-YYYY-MM-DD.md:
            - Title: "Daily AI Brief — YYYY-MM-DD"
            - Start with a short intro section:
              "Was heute wichtig ist"
            - Then create one section per found article
            - For each article include:
              - headline
              - source name
              - source link
              - short 2-3 sentence summary in German
              - short "Warum relevant?" sentence
              - tags

            Requirements for docs/news/latest.md:
            - same content as the daily file
            - title: "Latest AI Brief"
            - include "Last updated: YYYY-MM-DD"

            Update docs/index.md:
            - add a link near the top to docs/news/latest.md
            - optionally also link to today's daily file

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: content/daily-${{ github.run_id }}
          title: "AI Content Update (Daily)"
          commit-message: "Daily content update"
          body: |
            Automated daily update:
            - fetched RSS feeds
            - generated daily news + content ideas
