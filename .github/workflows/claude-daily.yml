name: Claude - Daily News + Ideas

on:
  schedule:
    - cron: "10 6 * * *" # täglich 06:10 UTC
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser requests beautifulsoup4

      - name: Fetch RSS feeds
        run: python scripts/fetch_feeds.py

      - name: Fetch article texts
        run: python scripts/fetch_article_texts.py

      - name: Run Claude Code Action (write files only)
        uses: anthropics/claude-code-action@v1
        
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          claude_args: |
            --allowedTools
            Read,Write,Edit
          prompt: |
              Create the file docs/_agent_test.md with exactly this content:
            
              # Agent Test
            
              This file was generated by Claude in GitHub Actions.
            
              Do not run git commands.
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          add-paths: |
            docs/**
          branch: content/daily-${{ github.run_id }}
          title: "AI Content Update (Daily)"
          commit-message: "Daily news update"
          body: |
            Automated daily update:
            - fetched RSS feeds
            - fetched article texts
            - generated daily AI brief
            - updated latest news page
            - updated docs index
