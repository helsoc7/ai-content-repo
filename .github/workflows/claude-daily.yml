name: Claude - Daily News + Ideas

on:
  schedule:
    - cron: "10 6 * * *" # täglich 06:10 UTC
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install RSS dependencies
        run: pip install feedparser

      - name: Fetch RSS feeds
        run: python scripts/fetch_feeds.py

      - name: Run Claude Code Action (write files only)
        uses: anthropics/claude-code-action@v1
        
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
              Create the file docs/_agent_test.md with this exact content:
        
              # Agent Test
              This file was generated by the GitHub Action.
        
              Do NOT run git commands.

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: content/daily-${{ github.run_id }}
          title: "AI Content Update (Daily)"
          commit-message: "Daily content update"
          body: |
            Automated daily update:
            - fetched RSS feeds
            - generated daily news + content ideas
