name: Claude - Daily News + Ideas

on:
  schedule:
    - cron: "10 6 * * *" # täglich 06:10 UTC
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install RSS dependencies
        run: pip install feedparser

      - name: Fetch RSS feeds
        run: python scripts/fetch_feeds.py

      - name: Run Claude Code Action (write files only)
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          prompt: |
            Follow CLAUDE.md strictly.

            IMPORTANT:
            - Read input from data/news_links.json.
            - Do NOT run git commands.
            - Do NOT create branches or PRs. Only create/update files.

            Use today's date in Europe/Berlin format YYYY-MM-DD.

            1) Create/update:
               docs/news/YYYY-MM/daily-YYYY-MM-DD.md
               Use ONLY items from data/news_links.json as your sources.
               For each news item, include:
               - What happened (1–2 sentences)
               - Why it matters (1–2 sentences)
               - Sources (use the link from the JSON)
               - Tags (llm/agentic/multi-agent/agi/asi + optional)

            2) Create/update:
               docs/ideas/YYYY-MM/daily-YYYY-MM-DD.md
               Create 20–40 ideas derived from today's news.

            3) Update docs/index.md:
               Add links to the newest daily news + ideas at the top.

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: content/daily-${{ github.run_id }}
          title: "AI Content Update (Daily)"
          commit-message: "Daily content update"
          body: |
            Automated daily update:
            - fetched RSS feeds
            - generated daily news + content ideas
